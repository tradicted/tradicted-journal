name: Build Snap

on:
  workflow_dispatch:

jobs:
  build-snap:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: snapcore/action-build@v1
        id: snapcraft
        with:
          path: .

      - uses: actions/upload-artifact@v4
        with:
          name: snap-build
          path: ${{ steps.snapcraft.outputs.snap }}
name: Build Snap

on:
  workflow_dispatch:

jobs:
  build-snap:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Linux unpacked
        run: npx electron-vite build && npx electron-builder --linux dir

      - name: Install Snapcraft and LXD
        run: |
          sudo snap install snapcraft --classic
          echo /snap/bin >> $GITHUB_PATH
          sudo /snap/bin/lxd waitready
          sudo /snap/bin/lxd init --auto
          sudo snap set lxd daemon.group=adm
          sudo snap restart lxd
          sudo snap set snapcraft provider=lxd
          sudo iptables -I DOCKER-USER -i lxdbr0 -j ACCEPT || true

      - name: Build snap
        run: cd snap && sg lxd -c 'snapcraft --use-lxd'

      - uses: actions/upload-artifact@v4
        with:
          name: snap-build
          path: "snap/*.snap"
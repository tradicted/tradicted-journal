name: Build Snap

on:
  workflow_dispatch:

jobs:
  build-snap:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Debug
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== ROOT FILES ==="
          ls -la
          echo "=== SNAP DIR ==="
          ls -la snap/ || echo "snap/ does not exist"
          echo "=== GIT FILES IN SNAP ==="
          git ls-files snap/
          echo "=== SNAPCRAFT VERSION ==="
          which snapcraft || echo "snapcraft not installed yet"

      - name: Install snapcraft
        run: |
          sudo snap install snapcraft --classic
          echo /snap/bin >> $GITHUB_PATH

      - name: Debug snapcraft
        run: |
          echo "=== SNAPCRAFT PATH ==="
          which snapcraft
          snapcraft --version
          echo "=== CURRENT DIR ==="
          pwd
          echo "=== CD SNAP AND PWD ==="
          cd snap && pwd && ls -la

      - name: Build snap
        run: |
          cd snap && SNAPCRAFT_BUILD_ENVIRONMENT=host snapcraft pack .

      - uses: actions/upload-artifact@v4
        with:
          name: snap-build
          path: "snap/*.snap"
name: Build Snap

on:
  workflow_dispatch:

jobs:
  build-snap:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Snapcraft with LXD
        uses: samuelmeuli/action-snapcraft@v3

      - name: Build snap
        run: sg lxd -c 'snapcraft --use-lxd'

      - uses: actions/upload-artifact@v4
        with:
          name: snap-build
          path: "*.snap"
name: Build Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install snapcraft
        run: |
          sudo snap install snapcraft --classic
          echo /snap/bin >> $GITHUB_PATH

      - name: Install dependencies
        run: npm ci

      # Compile the app (renderer + main + preload) into out/ via electron-vite.
      # Without this, electron-builder packages an empty app.asar and fails with
      # "out/main/index.js ... not found in this archive".
      - name: Build app bundle
        run: npm run build

      # Build AppImage + deb (these don't need snapcraft). Uploaded as artifacts.
      - name: Build AppImage + deb
        run: npx electron-builder --linux AppImage deb --publish never

      # Build the snap in isolation so a snap failure can't be masked by the
      # AppImage/deb build, and publish it to the Snap Store (edge channel).
      # SNAPCRAFT_BUILD_ENVIRONMENT=host + SNAP_DESTRUCTIVE_MODE keep snapcraft
      # from trying to spawn an LXD/multipass VM it can't create on the runner.
      - name: Build + publish snap to Snap Store
        run: npx electron-builder --linux snap --publish always
        env:
          SNAP_DESTRUCTIVE_MODE: "true"
          SNAPCRAFT_BUILD_ENVIRONMENT: host
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-builds
          path: |
            dist-electron-build/*.AppImage
            dist-electron-build/*.deb
            dist-electron-build/*.snap
